<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="left">
    <span class="hdate">ダッシュボード</span>
  </div>
  <div class="right">
    <button id="snapshot-config-btn" title="スナップショット保存先を設定">📁</button>
    <a id="apps-menu-btn" href="https://www.google.com/" target="_blank" rel="noopener" title="Google を開く" aria-label="Google を開く">
      <svg width="20" height="20" viewBox="0 0 48 48" aria-hidden="true">
        <path fill="#4285F4" d="M45.12 24.5c0-1.56-.14-3.06-.4-4.5H24v8.51h11.84c-.51 2.75-2.06 5.08-4.39 6.64v5.52h7.11c4.16-3.83 6.56-9.47 6.56-16.17z"/>
        <path fill="#34A853" d="M24 46c5.94 0 10.92-1.97 14.56-5.33l-7.11-5.52c-1.97 1.32-4.49 2.1-7.45 2.1-5.73 0-10.58-3.87-12.31-9.07H4.34v5.7C7.96 41.07 15.4 46 24 46z"/>
        <path fill="#FBBC05" d="M11.69 28.18C11.25 26.86 11 25.45 11 24s.25-2.86.69-4.18v-5.7H4.34C2.85 17.09 2 20.45 2 24c0 3.55.85 6.91 2.34 9.88l7.35-5.7z"/>
        <path fill="#EA4335" d="M24 10.75c3.23 0 6.13 1.11 8.41 3.29l6.31-6.31C34.91 4.18 29.93 2 24 2 15.4 2 7.96 6.93 4.34 14.12l7.35 5.7c1.73-5.2 6.58-9.07 12.31-9.07z"/>
      </svg>
    </a>
  </div>
</header>

<div class="main">
  <div class="col-left">
    <div class="card" id="clock-card">
      <div id="clock-time">00:00<span id="clock-sec">:00</span></div>
      <div id="clock-date"></div>
    </div>
    <div class="card" id="cal-card">
      <div class="cal-nav">
        <button id="cal-prev">‹</button>
        <span id="cal-label"></span>
        <button id="cal-next">›</button>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>
    <div class="card" id="memo-card">
      <div class="card-header">
        <span>メモ</span>
        <span style="font-size:10px;color:var(--muted);font-weight:400">自動保存</span>
      </div>
      <textarea id="memo-textarea" placeholder="ここに自由にメモを書けます..."></textarea>
    </div>
    <div class="card" id="tasks-card">
      <div class="card-header" style="color:var(--purple)">
        <span>✓ タスク</span>
        <button class="add-btn" id="tasks-clear" title="完了済みを削除" style="font-size:12px">🗑</button>
      </div>
      <div class="task-add-row">
        <input type="text" id="task-input" placeholder="タスクを追加...">
        <button id="task-add-btn">追加</button>
      </div>
      <div class="task-list" id="task-list"></div>
    </div>
  </div>

  <div class="col-center">
    <div id="site-icons">
      <a class="site-icon-item" href="https://www.kechiiiiin.com/" target="_blank" rel="noopener">
        <div class="site-icon-box"><img src="https://www.kechiiiiin.com/favicon.ico" alt="" onerror="this.src='https://www.google.com/s2/favicons?domain=kechiiiiin.com&sz=64'"></div>
        <span class="site-icon-label">まあ、そうかもしれない</span>
      </a>
      <a class="site-icon-item" href="https://listen.style/p/kechiiiiin" target="_blank" rel="noopener">
        <div class="site-icon-box"><img src="https://images.kechiiiiin.com/icon/%E3%81%91%E3%81%A1%E3%83%BC%E3%82%93%E3%83%9B%E3%82%9A%E3%83%83%E3%83%88%E3%82%99%E3%82%AD%E3%83%A3%E3%82%B9%E3%83%88.png" alt=""></div>
        <span class="site-icon-label">けちーんのラジオ</span>
      </a>
      <a class="site-icon-item" href="https://listen.style/p/itsumaji-radio" target="_blank" rel="noopener">
        <div class="site-icon-box"><img src="https://images.kechiiiiin.com/icon/%E3%81%84%E3%81%A4%E3%81%BE%E3%81%97%E3%82%99%E3%83%A9%E3%82%B7%E3%82%99%E3%82%AA.jpg" alt=""></div>
        <span class="site-icon-label">いつまじラジオ</span>
      </a>
    </div>
    <div id="site-icons-apps">
      <a class="site-icon-item" href="obsidian://open">
        <div class="site-icon-box"><img src="https://www.google.com/s2/favicons?domain=obsidian.md&sz=64" alt=""></div>
        <span class="site-icon-label">Obsidian</span>
      </a>
      <a class="site-icon-item" href="slack://open">
        <div class="site-icon-box"><img src="https://www.google.com/s2/favicons?domain=slack.com&sz=64" alt=""></div>
        <span class="site-icon-label">Slack</span>
      </a>
      <a class="site-icon-item" href="discord://">
        <div class="site-icon-box"><img src="https://www.google.com/s2/favicons?domain=discord.com&sz=64" alt=""></div>
        <span class="site-icon-label">Discord</span>
      </a>
    </div>
    <div class="links-area" id="links-area"></div>
  </div>
</div>

<!-- リンク編集モーダル -->
<div class="overlay" id="modal">
  <div class="modal">
    <h3 id="modal-title">リンクを追加</h3>
    <input type="text" id="m-label" placeholder="ラベル (例: GitHub)">
    <input type="url" id="m-url" placeholder="URL (例: https://github.com)">
    <div class="modal-btns">
      <button id="m-delete" class="danger" style="display:none">削除</button>
      <div style="flex:1"></div>
      <button id="m-cancel">キャンセル</button>
      <button id="m-save" class="primary">保存</button>
    </div>
  </div>
</div>

<script>
/* CLOCK */
const DAYS=['日','月','火','水','木','金','土'];
function updateClock(){
  const n=new Date();
  const hh=String(n.getHours()).padStart(2,'0'),mm=String(n.getMinutes()).padStart(2,'0'),ss=String(n.getSeconds()).padStart(2,'0');
  document.getElementById('clock-time').innerHTML=`${hh}:${mm}<span id="clock-sec">:${ss}</span>`;
  document.getElementById('clock-date').textContent=`${n.getFullYear()}年${n.getMonth()+1}月${n.getDate()}日 ${DAYS[n.getDay()]}曜日`;
}
updateClock(); setInterval(updateClock,1000);

/* HOLIDAYS */
const HOLIDAYS={'2025-01-01':'元日','2025-01-13':'成人の日','2025-02-11':'建国記念の日','2025-02-23':'天皇誕生日','2025-03-20':'春分の日','2025-04-29':'昭和の日','2025-05-03':'憲法記念日','2025-05-04':'みどりの日','2025-05-05':'こどもの日','2025-05-06':'振替休日','2025-07-21':'海の日','2025-08-11':'山の日','2025-09-15':'敬老の日','2025-09-23':'秋分の日','2025-10-13':'スポーツの日','2025-11-03':'文化の日','2025-11-23':'勤労感謝の日','2026-01-01':'元日','2026-01-12':'成人の日','2026-02-11':'建国記念の日','2026-02-23':'天皇誕生日','2026-03-20':'春分の日','2026-04-29':'昭和の日','2026-05-03':'憲法記念日','2026-05-04':'みどりの日','2026-05-05':'こどもの日','2026-07-20':'海の日','2026-08-11':'山の日','2026-09-21':'敬老の日','2026-09-23':'秋分の日','2026-10-12':'スポーツの日','2026-11-03':'文化の日','2026-11-23':'勤労感謝の日'};
function dateKey(y,m,d){return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}

/* CALENDAR */
let calYear=new Date().getFullYear(),calMonth=new Date().getMonth();
function renderCalendar(){
  const today=new Date();
  document.getElementById('cal-label').textContent=`${calYear}年${calMonth+1}月`;
  const grid=document.getElementById('cal-grid');grid.innerHTML='';
  DAYS.forEach(d=>{const s=document.createElement('div');s.className='dow';s.textContent=d;grid.appendChild(s);});
  const firstDay=new Date(calYear,calMonth,1).getDay(),lastDate=new Date(calYear,calMonth+1,0).getDate(),prevLast=new Date(calYear,calMonth,0).getDate();
  for(let i=firstDay-1;i>=0;i--){const s=document.createElement('div');s.className='cal-day other-month';s.textContent=prevLast-i;grid.appendChild(s);}
  for(let d=1;d<=lastDate;d++){
    const s=document.createElement('div'),dow=new Date(calYear,calMonth,d).getDay(),key=dateKey(calYear,calMonth+1,d);
    const isToday=d===today.getDate()&&calMonth===today.getMonth()&&calYear===today.getFullYear(),isHoliday=HOLIDAYS[key];
    let cls='cal-day';
    if(isToday)cls+=' today';else if(isHoliday)cls+=' holiday';else if(dow===0)cls+=' sun';else if(dow===6)cls+=' sat';
    s.className=cls;s.textContent=d;if(isHoliday&&!isToday)s.title=isHoliday;grid.appendChild(s);
  }
}
document.getElementById('cal-prev').addEventListener('click',()=>{calMonth--;if(calMonth<0){calMonth=11;calYear--;}renderCalendar();});
document.getElementById('cal-next').addEventListener('click',()=>{calMonth++;if(calMonth>11){calMonth=0;calYear++;}renderCalendar();});
renderCalendar();


/* DATA STORAGE (Origin Private File System) */
let AppData={version:1,memo:'',cols:[],tasks:[],showSiteIcons:false};
let saveTimer=null;
const STORAGE_KEY='dashboard_data';

function saveData(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{
    try{localStorage.setItem(STORAGE_KEY,JSON.stringify(AppData));saveSnapshot();}
    catch(e){console.warn('Save failed:',e);}
  },400);
}

/* SNAPSHOT (File System Access API) */
const SNAPSHOT_DB='snapshot-config',SNAPSHOT_STORE='handles',SNAPSHOT_KEY='storage-history';
function openSnapshotDB(){
  return new Promise((resolve,reject)=>{
    const req=indexedDB.open(SNAPSHOT_DB,1);
    req.onupgradeneeded=()=>req.result.createObjectStore(SNAPSHOT_STORE);
    req.onsuccess=()=>resolve(req.result);
    req.onerror=()=>reject(req.error);
  });
}
async function loadDirHandle(){
  try{
    const db=await openSnapshotDB();
    return await new Promise(resolve=>{
      const tx=db.transaction(SNAPSHOT_STORE,'readonly');
      const req=tx.objectStore(SNAPSHOT_STORE).get(SNAPSHOT_KEY);
      req.onsuccess=()=>resolve(req.result||null);
      req.onerror=()=>resolve(null);
    });
  }catch{return null;}
}
async function saveDirHandle(handle){
  const db=await openSnapshotDB();
  return new Promise(resolve=>{
    const tx=db.transaction(SNAPSHOT_STORE,'readwrite');
    tx.objectStore(SNAPSHOT_STORE).put(handle,SNAPSHOT_KEY);
    tx.oncomplete=()=>resolve();
  });
}
async function pickSnapshotDir(){
  if(!window.showDirectoryPicker){alert('このブラウザは File System Access API に対応していません');return null;}
  try{
    const handle=await window.showDirectoryPicker({id:'storage-history',mode:'readwrite'});
    await saveDirHandle(handle);
    return handle;
  }catch(e){if(e.name!=='AbortError')console.warn('pick dir failed:',e);return null;}
}
async function getDirHandleForWrite(){
  const handle=await loadDirHandle();
  if(!handle)return null;
  const opts={mode:'readwrite'};
  let perm=await handle.queryPermission(opts);
  if(perm==='granted')return handle;
  return null;
}
function snapshotFilename(){
  const n=new Date(),pad=v=>String(v).padStart(2,'0');
  return `${n.getFullYear()}${pad(n.getMonth()+1)}${pad(n.getDate())}${pad(n.getHours())}${pad(n.getMinutes())}${pad(n.getSeconds())}.json`;
}
const SNAPSHOT_MAX_FILES=30;
let lastSnapshotJSON=null;
async function pruneOldSnapshots(dir){
  try{
    const names=[];
    for await(const [name,h] of dir.entries()){
      if(h.kind==='file'&&/^\d{14}\.json$/.test(name))names.push(name);
    }
    if(names.length<=SNAPSHOT_MAX_FILES)return;
    names.sort();
    const toDelete=names.slice(0,names.length-SNAPSHOT_MAX_FILES);
    for(const name of toDelete){
      try{await dir.removeEntry(name);}catch(e){console.warn('Prune failed for',name,e);}
    }
  }catch(e){console.warn('Prune scan failed:',e);}
}
async function saveSnapshot(){
  try{
    const dir=await getDirHandleForWrite();
    if(!dir)return;
    const json=JSON.stringify(AppData,null,2);
    if(json===lastSnapshotJSON)return;
    const file=await dir.getFileHandle(snapshotFilename(),{create:true});
    const writer=await file.createWritable();
    await writer.write(json);
    await writer.close();
    lastSnapshotJSON=json;
    await pruneOldSnapshots(dir);
  }catch(e){console.warn('Snapshot failed:',e);}
}
document.getElementById('snapshot-config-btn').addEventListener('click',async()=>{
  const handle=await pickSnapshotDir();
  if(handle){await saveSnapshot();alert('保存先を設定しました。以後の変更が自動でスナップショット保存されます。');}
});
async function ensureSnapshotPermission(){
  const handle=await loadDirHandle();
  if(!handle)return;
  const opts={mode:'readwrite'};
  if((await handle.queryPermission(opts))==='granted')return;
  const tryGrant=async()=>{
    document.removeEventListener('pointerdown',tryGrant,true);
    document.removeEventListener('keydown',tryGrant,true);
    try{await handle.requestPermission(opts);}catch(e){console.warn('requestPermission failed:',e);}
  };
  document.addEventListener('pointerdown',tryGrant,true);
  document.addEventListener('keydown',tryGrant,true);
}
function initStorage(){
  try{
    const text=localStorage.getItem(STORAGE_KEY);
    if(text){
      const s=JSON.parse(text);
      AppData={...AppData,...s};
      if(!AppData.cols)AppData.cols=[];
    }
  }catch(e){}
}

/* MEMO */
function initMemo(){
  const ta=document.getElementById('memo-textarea');
  ta.value=AppData.memo||'';
  ta.addEventListener('input',()=>{AppData.memo=ta.value;saveData();});
}

/* LINKS */
const COL_COLORS=['#34a85a','#1a73e8','#f5900c','#9c27b0','#e53935','#00838f'];
function renderCols(){
  const area=document.getElementById('links-area');area.innerHTML='';
  AppData.cols.forEach((col,ci)=>{
    const div=document.createElement('div');div.className='card link-col';
    const hdr=document.createElement('div');hdr.className='card-header';hdr.style.color=col.color;hdr.innerHTML=`<span>${col.name}</span>`;
    const ab=document.createElement('button');ab.className='add-btn';ab.textContent='+';ab.title='リンクを追加';ab.addEventListener('click',()=>openLinkModal(ci,-1));hdr.appendChild(ab);
    const db=document.createElement('button');db.className='add-btn';db.textContent='×';db.title='カラムを削除';db.style.marginLeft='2px';db.addEventListener('click',()=>{if(confirm(`「${col.name}」を削除しますか？`)){AppData.cols.splice(ci,1);saveData();renderCols();}});hdr.appendChild(db);
    div.appendChild(hdr);
    const list=document.createElement('div');list.className='link-list';
    col.links.forEach((lk,li)=>{
      const a=document.createElement('a');a.className='link-item';a.href=lk.url;a.target='_blank';a.rel='noopener';
      const domain=(()=>{try{return new URL(lk.url).hostname;}catch{return '';}})();
      const fsrc=domain?`https://www.google.com/s2/favicons?domain=${domain}&sz=32`:'';
      a.innerHTML=`<div class="favicon">${fsrc?`<img src="${fsrc}" alt="" onerror="this.style.display='none';this.parentNode.textContent='🌐'">`:' 🌐'}</div><span class="lname">${lk.label}</span>`;
      const eb=document.createElement('button');eb.className='ledit';eb.textContent='編集';eb.addEventListener('click',e=>{e.preventDefault();openLinkModal(ci,li);});
      a.appendChild(eb);list.appendChild(a);
    });
    const ar=document.createElement('div');ar.className='add-link-btn';ar.innerHTML='<span>＋</span><span>追加</span>';ar.addEventListener('click',()=>openLinkModal(ci,-1));list.appendChild(ar);
    div.appendChild(list);area.appendChild(div);
  });
  const addCol=document.createElement('div');addCol.className='add-col-card';addCol.textContent='＋ カラムを追加';
  addCol.addEventListener('click',()=>{const name=prompt('カラム名を入力してください');if(!name||!name.trim())return;AppData.cols.push({id:'col'+Date.now(),name:name.trim().toUpperCase(),color:COL_COLORS[AppData.cols.length%COL_COLORS.length],links:[]});saveData();renderCols();});
  area.appendChild(addCol);
}
let modalColIdx=-1,modalLinkIdx=-1;
function openLinkModal(ci,li){
  modalColIdx=ci;modalLinkIdx=li;const isEdit=li>=0,col=AppData.cols[ci];
  document.getElementById('modal-title').textContent=isEdit?'リンクを編集':'リンクを追加';
  document.getElementById('m-label').value=isEdit?col.links[li].label:'';
  document.getElementById('m-url').value=isEdit?col.links[li].url:'';
  document.getElementById('m-delete').style.display=isEdit?'inline-block':'none';
  document.getElementById('modal').classList.add('open');document.getElementById('m-label').focus();
}
document.getElementById('m-cancel').addEventListener('click',()=>document.getElementById('modal').classList.remove('open'));
document.getElementById('modal').addEventListener('click',e=>{if(e.target===document.getElementById('modal'))document.getElementById('modal').classList.remove('open');});
document.getElementById('m-url').addEventListener('blur',()=>{
  const urlVal=document.getElementById('m-url').value.trim();
  const labelEl=document.getElementById('m-label');
  if(urlVal&&!labelEl.value.trim()){
    try{labelEl.value=new URL(/^https?:\/\//i.test(urlVal)?urlVal:'https://'+urlVal).hostname.replace(/^www\./,'');}catch{}
  }
});
document.getElementById('m-save').addEventListener('click',()=>{
  const label=document.getElementById('m-label').value.trim();
  let url=document.getElementById('m-url').value.trim();if(!label||!url)return;if(!/^https?:\/\//i.test(url))url='https://'+url;
  const entry={label,url};
  if(modalLinkIdx>=0)AppData.cols[modalColIdx].links[modalLinkIdx]=entry;else AppData.cols[modalColIdx].links.push(entry);
  saveData();renderCols();document.getElementById('modal').classList.remove('open');
});
document.getElementById('m-delete').addEventListener('click',()=>{AppData.cols[modalColIdx].links.splice(modalLinkIdx,1);saveData();renderCols();document.getElementById('modal').classList.remove('open');});
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.getElementById('modal').classList.remove('open');});


/* TASKS */
let taskIdCounter=Date.now();
function escapeHTML(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function renderTasks(){
  const tasks=AppData.tasks||[],list=document.getElementById('task-list');list.innerHTML='';
  tasks.forEach((t,i)=>{
    const div=document.createElement('div');div.className='task-item'+(t.done?' done':'');
    div.innerHTML=`<input type="checkbox" id="task-${i}" ${t.done?'checked':''}><label for="task-${i}">${escapeHTML(t.text)}</label><button class="tdel">×</button>`;
    div.querySelector('input').addEventListener('change',function(){AppData.tasks[i].done=this.checked;saveData();renderTasks();});
    div.querySelector('.tdel').addEventListener('click',()=>{AppData.tasks.splice(i,1);saveData();renderTasks();});
    list.appendChild(div);
  });
}
document.getElementById('task-add-btn').addEventListener('click',addTask);
document.getElementById('task-input').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.isComposing&&e.keyCode!==229)addTask();});
function addTask(){const input=document.getElementById('task-input'),text=input.value.trim();if(!text)return;if(!AppData.tasks)AppData.tasks=[];AppData.tasks.push({text,done:false,id:taskIdCounter++});saveData();input.value='';renderTasks();}
document.getElementById('tasks-clear').addEventListener('click',()=>{AppData.tasks=(AppData.tasks||[]).filter(t=>!t.done);saveData();renderTasks();});

/* AUTO RELOAD (非アクティブ時のみ) */
const RELOAD_INTERVAL_MS=60*1000;
setInterval(()=>{if(document.hidden)location.reload();},RELOAD_INTERVAL_MS);

/* INIT */
initStorage();
document.getElementById('site-icons').style.display=AppData.showSiteIcons?'flex':'none';
initMemo();renderCols();renderTasks();
ensureSnapshotPermission();
</script>
</body>
</html>
